<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1224"/>
      <stop offset="100%" stop-color="#070912"/>
    </linearGradient>
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff2bd6"/>
      <stop offset="100%" stop-color="#00f6ff"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <rect x="14" y="14" width="484" height="484" rx="98" fill="none" stroke="url(#neon)" stroke-width="5" opacity="0.55"/>

  <g filter="url(#glow)">
    <!-- bar -->
    <rect x="168" y="236" width="176" height="40" rx="20" fill="url(#neon)"/>
    <!-- left plates -->
    <rect x="64" y="166" width="66" height="180" rx="22" fill="url(#neon)"/>
    <rect x="128" y="196" width="44" height="120" rx="16" fill="url(#neon)"/>
    <!-- right plates -->
    <rect x="382" y="166" width="66" height="180" rx="22" fill="url(#neon)"/>
    <rect x="340" y="196" width="44" height="120" rx="16" fill="url(#neon)"/>
  </g>

  <g opacity="0.55" stroke="url(#neon)" stroke-width="3">
    <line x1="76" y1="120" x2="76" y2="150"/>
    <circle cx="76" cy="108" r="5" fill="url(#neon)" stroke="none"/>
    <line x1="436" y1="362" x2="436" y2="392"/>
    <circle cx="436" cy="404" r="5" fill="url(#neon)" stroke="none"/>
  </g>
</svg>
